<script>

document
.getElementById("symbols")
.addEventListener(
"keydown",
e=>{
if(e.key==="Enter"){
searchStocks();
}
}
);

function normalize(code){

code=code.trim();

if(
/^\d+$/.test(code)
){
return code+".TW";
}

return code.toUpperCase();

}

async function fetchStock(symbol){

try{

const url=
`https://financialmodelingprep.com/api/v3/quote/${symbol}?apikey=demo`;

const res=
await fetch(url);

const data=
await res.json();

if(!data.length){

return null;

}

const s=data[0];

return{

symbol:s.symbol,

name:s.name,

price:s.price,

diff:s.change,

pct:s.changesPercentage

};

}
catch{

return null;

}

}

async function searchStocks(){

const input=
document
.getElementById(
"symbols"
)
.value;

const result=
document
.getElementById(
"result"
);

if(!input){

alert("請輸入股票");

return;

}

result.innerHTML=
"<div>讀取中...</div>";

const list=

input

.split(",")

.map(normalize)

.filter(Boolean);

const rows=

await Promise.all(

list.map(
fetchStock
)

);

result.innerHTML="";

rows.forEach(s=>{

if(!s){

result.innerHTML+=`

<div class="card">

查不到資料

</div>

`;

return;

}

const cls=

s.diff>=0
?"up"
:"down";

result.innerHTML+=`

<div class="card">

<div class="symbol">

${s.symbol}

</div>

<div>

${s.name||""}

</div>

<div
class="price ${cls}"
>

${s.price}

</div>

<div
class="${cls}"
>

${s.diff}
(
${s.pct}%
)

</div>

</div>

`;

});

}

</script>
