<script>

async function getPrice(){

const input =
document
.getElementById("symbol")
.value
.trim();

if(!input){
alert("請輸入股票代號");
return;
}

let symbol=input;

// 自動補台股
if(/^\d+$/.test(symbol)){
symbol+=".TW";
}

const result=
document.getElementById("result");

result.innerHTML="讀取中…";

try{

const url=
`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`;

const res=
await fetch(url);

const data=
await res.json();

if(!data.chart.result){
throw new Error();
}

const meta=
data.chart.result[0].meta;

const price=
meta.regularMarketPrice;

const prev=
meta.previousClose;

const diff=
(price-prev).toFixed(2);

const pct=
(
diff/prev*100
).toFixed(2);

const color=
diff>=0
?"red"
:"green";

result.innerHTML=
`
<h2>${symbol}</h2>

<div
style="
font-size:48px;
color:${color};
font-weight:bold;
">

${price}

</div>

<div>

${diff}
(
${pct}%
)

</div>

`;

}
catch{

result.innerHTML=
"找不到股票代號";

}

}

</script>
