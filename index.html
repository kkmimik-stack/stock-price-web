<!doctype html>
<html lang="zh-Hant">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>股票即時查詢</title>

<style>

body{
font-family:Arial;
max-width:1200px;
margin:auto;
padding:24px;
background:#f5f5f5;
}

.row{
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
font-size:18px;
}

button{
padding:14px 22px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:
repeat(
auto-fill,
minmax(250px,1fr)
);

gap:16px;

margin-top:20px;
}

.card{

background:white;

padding:20px;

border-radius:12px;

}

.up{
color:red;
}

.down{
color:green;
}

.price{
font-size:40px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>📈 多股票查詢</h2>

<div class="row">

<input
id="symbols"
placeholder="2330,2317,NVDA"
/>

<button onclick="searchStocks()">
查詢
</button>

</div>

<div id="result" class="grid"></div>

<script>

function normalize(code){

code=code.trim();

if(
/^\d+$/.test(code)
){
return code+".TW";
}

return code.toUpperCase();

}

async function getStock(symbol){

try{

const url=
`https://api.allorigins.win/raw?url=${
encodeURIComponent(
`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`
)
}`;

const res=
await fetch(url);

const json=
await res.json();

const s=
json
.quoteResponse
.result?.[0];

if(!s){

return null;

}

return{

symbol:
s.symbol,

name:
s.shortName,

price:
s.regularMarketPrice,

diff:
s.regularMarketChange,

pct:
s.regularMarketChangePercent

};

}
catch{

return null;

}

}

async function searchStocks(){

const input=
document
.getElementById(
"symbols"
)
.value;

if(!input){

alert(
"請輸入股票"
);

return;

}

const box=
document
.getElementById(
"result"
);

box.innerHTML=
"讀取中...";

const list=

input

.split(",")

.map(
normalize
);

const rows=

await Promise.all(

list.map(
getStock
)

);

box.innerHTML="";

rows.forEach(v=>{

if(!v){

box.innerHTML+=`

<div class="card">

查不到資料

</div>

`;

return;

}

const cls=

v.diff>=0
?"up"
:"down";

box.innerHTML+=`

<div class="card">

<h3>

${v.symbol}

</h3>

<div>

${v.name}

</div>

<div
class="
price
${cls}
">

${v.price}

</div>

<div
class="${cls}"
>

${v.diff.toFixed(2)}

(
${v.pct.toFixed(2)}
%
)

</div>

</div>

`;

});

}

document
.getElementById(
"symbols"
)
.addEventListener(
"keydown",
e=>{

if(
e.key==="Enter"
){

searchStocks();

}

});

</script>

</body>

</html>
