<!doctype html>
<html lang="zh-Hant">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>股票即時查詢</title>

<style>

body{
font-family:Arial;
max-width:1200px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

.search{
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
font-size:18px;
}

button{
padding:14px 24px;
cursor:pointer;
}

.grid{

margin-top:20px;

display:grid;

grid-template-columns:
repeat(
auto-fill,
minmax(250px,1fr)
);

gap:15px;

}

.card{

background:white;

padding:18px;

border-radius:10px;

}

.up{
color:red;
}

.down{
color:green;
}

.price{
font-size:38px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>📈 多股票查詢</h2>

<div class="search">

<input
id="symbols"
placeholder="2330,2317,NVDA"
/>

<button onclick="searchStocks()">
查詢
</button>

</div>

<div id="result" class="grid"></div>

<script>

function normalize(code){

code=code.trim();

if(
/^[0-9]+$/.test(code)
){

return code+".TW";

}

return code.toUpperCase();

}

async function fetchStock(symbol){

try{

const url=
`https://financialmodelingprep.com/api/v3/quote/${symbol}?apikey=demo`;

const r=
await fetch(url);

const d=
await r.json();

if(
!d.length
){

return null;

}

const s=d[0];

return{

symbol:
s.symbol,

name:
s.name,

price:
s.price,

diff:
s.change,

pct:
s.changesPercentage

};

}
catch{

return null;

}

}

async function searchStocks(){

const input=

document
.getElementById(
"symbols"
)
.value;

if(!input){

alert(
"請輸入股票"
);

return;

}

const box=

document
.getElementById(
"result"
);

box.innerHTML=
"讀取中...";

const list=

input

.split(",")

.map(
normalize
);

const rows=

await Promise.all(

list.map(
fetchStock
)

);

box.innerHTML="";

rows.forEach(v=>{

if(!v){

box.innerHTML+=`

<div class="card">

查不到

</div>

`;

return;

}

const cls=

v.diff>=0
?"up"
:"down";

box.innerHTML+=`

<div class="card">

<h3>

${v.symbol}

</h3>

<div>

${v.name}

</div>

<div
class="
price
${cls}
">

${v.price}

</div>

<div
class="${cls}"
>

${v.diff}

(
${v.pct}
%
)

</div>

</div>

`;

});

}

document
.getElementById(
"symbols"
)
.addEventListener(
"keydown",
e=>{

if(
e.key==="Enter"
){

searchStocks();

}

});

</script>

</body>

</html>
